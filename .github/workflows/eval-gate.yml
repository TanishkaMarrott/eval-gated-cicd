name: Eval Gate

on:
  pull_request:
    paths:
      - "examples/**"
      - "evals/**"
      - "runner/**"
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "evals/**"
      - "runner/**"

jobs:
  eval:
    name: Run eval gate (25% sample)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evals
        id: eval
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/run_evals.py --ci 2>&1 | tee eval_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Commit results/latest.md
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/latest.md
          git diff --cached --quiet || git commit -m "ci: update eval results [skip ci]"
          git push || true

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('results/latest.md')
              ? fs.readFileSync('results/latest.md', 'utf8')
              : fs.readFileSync('eval_output.txt', 'utf8').slice(-2000);

            // delete previous bot comment if exists
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body.includes('Eval Gate')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if gate blocked
        if: steps.eval.outputs.exit_code != '0'
        run: exit 1
